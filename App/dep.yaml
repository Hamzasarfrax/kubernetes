apiVersion: apps/v1
kind: Deployment
metadata:
  name: salmatextile-app-deployment
  namespace: dev
  labels:
    app: salmatextile-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: salmatextile-app
  template:
    metadata:
      labels:
        app: salmatextile-app
    spec:
      containers:
        - name: salmatextile-app
          image: docuser1122/salmatextile-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
# container ports are used to specify the port on which the containerized application is listening. In this case, the container is configured to listen on port 8000. This means that any traffic directed to this port will be handled by the application running inside the container.
