apiVersion: apps/v1
kind: Deployment
metadata:
  name: salmatextile-app-deployment
  namespace: dev
  labels:
    app: salmatextile-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: salmatextile-app
  template:
    metadata:
      labels:
        app: salmatextile-app
    spec:
      containers:
        - name: salmatextile-app
          image: docuser1122/salmatextile-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
